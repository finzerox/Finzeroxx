<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finzerox Services</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    background:#0d47a1;
    color:white;
    padding:15px;
}

.header img {
    width:60px;
    height:60px;
    border-radius:10px;
}

/* DESCRIPTION */
.description-frame {
    background:#e3f2fd;
    text-align:center;
    padding:30px;
    font-size:18px;
    color:#0d47a1;
}

/* GRID */
.container {
    padding:30px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap:20px;
}

/* CARD */
.project-card {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    position: relative;
}

.hot-offer {
    position:absolute;
    top:15px;
    right:15px;
    background:red;
    color:white;
    padding:5px 12px;
    font-weight:bold;
    border-radius:5px;
}

/* TOP */
.top-section {
    display:flex;
    gap:15px;
    align-items:center;
}

.image-box {
    width:70%;
    text-align:center;
}

.image-box img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
    transition: transform 0.3s;
}

.image-box img:hover {
    transform: scale(1.05);
}

.price-box {
    width:30%;
    background:#e8f5e9;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.original-price {
    text-decoration: line-through;
    color: red;
}

.discounted-price {
    color: green;
    font-size:22px;
    font-weight:bold;
}

.btn {
    margin-top:10px;
    padding:10px;
    background:#43A047;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}

.account-details {
    display:none;
    margin-top:15px;
    background:#eeeeee;
    padding:10px;
    border-radius:8px;
}

/* MODAL */
#imageModal {
    display:none;
    position:fixed;
    z-index:999;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    text-align:center;
}

#imageModal img {
    max-width:90%;
    max-height:90%;
    margin-top:50px;
}

#imageModal span {
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* FOOTER */
.footer {
    background:#0d47a1;
    color:white;
    padding:15px;
    text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="Finzerox.png">
    <div>
        <h2>Finzerox</h2>
        <p>Your Business Growth Partner</p>
    </div>
</div>

<!-- DESCRIPTION -->
<div class="description-frame">
    <h3>Our Services</h3>
    <p>We provide dashboards, Excel automation & data analysis.</p>
</div>

<!-- PROJECT -->
<div class="container">
<div class="grid">

<!-- PROJECT 1 -->
<div class="project-card">
<div class="hot-offer">🔥 Hot Offer</div>

<h3>Power BI Dashboard</h3>

<div class="top-section">
<div class="image-box">
<img id="img1" src="https://raw.githubusercontent.com/your-username/repo/main/p1-1.jpg" onclick="openModal(this.src)">
<br>
<button onclick="prevImage('img1', images1)">⬅️</button>
<button onclick="nextImage('img1', images1)">➡️</button>
</div>

<div class="price-box">
<div class="original-price">$100</div>
<div class="discounted-price">$90</div>
<button class="btn" onclick="showDetails('acc1')">CLICK HERE</button>
</div>
</div>

<p>Interactive dashboard with KPIs.</p>
<div id="acc1" class="account-details">
Name: Mohamed Sathik<br>
Account: 1234567890
</div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="imageModal">
<span onclick="closeModal()">×</span>
<img id="modalImg">
</div>

<script>
const images1 = [
"https://raw.githubusercontent.com/your-username/repo/main/p1-1.jpg",
"https://raw.githubusercontent.com/your-username/repo/main/p1-2.jpg"
];

let indexes = {};

function nextImage(id, images) {
if (!indexes[id]) indexes[id] = 0;
indexes[id] = (indexes[id] + 1) % images.length;
document.getElementById(id).src = images[indexes[id]];
}

function prevImage(id, images) {
if (!indexes[id]) indexes[id] = 0;
indexes[id] = (indexes[id] - 1 + images.length) % images.length;
document.getElementById(id).src = images[indexes[id]];
}

function showDetails(id) {
document.getElementById(id).style.display = "block";
}

function openModal(src) {
document.getElementById("imageModal").style.display = "block";
document.getElementById("modalImg").src = src;
}

function closeModal() {
document.getElementById("imageModal").style.display = "none";
}
</script>

</body>
</html>
