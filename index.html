<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finzerox Services</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    background:#0d47a1;
    color:white;
    padding:15px;
}

.header img {
    width:60px;
    height:60px;
    border-radius:10px;
}

/* DESCRIPTION */
.description-frame {
    background:#e3f2fd;
    text-align:center;
    padding:30px;
    font-size:18px;
    color:#0d47a1;
}

/* GRID */
.container { padding:30px; }

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap:20px;
}

/* CARD */
.project-card {
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    position: relative;
}

.hot-offer {
    position:absolute;
    top:15px;
    right:15px;
    background:red;
    color:white;
    padding:5px 12px;
    border-radius:5px;
    font-weight:bold;
}

/* TOP */
.top-section {
    display:flex;
    gap:15px;
    align-items:center;
}

.image-box { width:70%; text-align:center; }

.image-box img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

.slider-controls { margin-top:5px; }

.price-box {
    width:30%;
    background:#e8f5e9;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.original-price {
    text-decoration: line-through;
    color:red;
}

.discounted-price {
    color:green;
    font-size:20px;
    font-weight:bold;
}

.btn {
    margin-top:10px;
    padding:10px;
    background:#43A047;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}

.account-details {
    display:none;
    margin-top:10px;
    background:#eee;
    padding:10px;
    border-radius:5px;
}

/* MODAL */
#imageModal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    text-align:center;
}

#imageModal img {
    max-width:90%;
    margin-top:5%;
}

#imageModal span {
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="Finzerox.png">
    <div>
        <h2>Finzerox</h2>
        <p>Your Business Growth Partner</p>
    </div>
</div>

<!-- DESCRIPTION -->
<div class="description-frame">
    <h3>Our Services</h3>
    <p>We provide dashboards, automation & analytics solutions.</p>
</div>

<!-- PROJECT -->
<div class="container">
<div class="grid">

<div class="project-card">
    <div class="hot-offer">🔥 Hot Offer</div>
    <h3>Power BI Dashboard</h3>

    <div class="top-section">
        <div class="image-box">
            <img id="img1" src="PVM_page-0001.jpg" onclick="openModal(this.src)">
            <div class="slider-controls">
                <button onclick="prevImage('img1', images1)">⬅️</button>
                <button onclick="nextImage('img1', images1)">➡️</button>
            </div>
        </div>

        <div class="price-box">
            <div class="original-price">$100</div>
            <div class="discounted-price">$90</div>
            <button class="btn" onclick="showDetails('acc1')">CLICK HERE</button>
        </div>
    </div>

    <p>Interactive dashboard with KPIs.</p>
    <div id="acc1" class="account-details">
        Name: Mohamed Sathik<br>Account: 1234567890
    </div>
</div>

</div>
</div>

<!-- MODAL -->
<div id="imageModal">
    <span onclick="closeModal()">&times;</span>
    <img id="modalImg">
</div>

<script>
// IMAGES
const images1 = [
"PVM_page-0001.jpg",
"PVM_page-0002.jpg",
"PVM_page-0003.jpg"
];

// INDEX
let indexes = { img1: 0 };

// NEXT
function nextImage(id, images) {
    indexes[id] = (indexes[id] + 1) % images.length;
    document.getElementById(id).src = images[indexes[id]];
}

// PREV
function prevImage(id, images) {
    indexes[id] = (indexes[id] - 1 + images.length) % images.length;
    document.getElementById(id).src = images[indexes[id]];
}

// SHOW DETAILS
function showDetails(id) {
    document.getElementById(id).style.display = "block";
}

// MODAL
function openModal(src) {
    document.getElementById("imageModal").style.display = "block";
    document.getElementById("modalImg").src = src;
}

function closeModal() {
    document.getElementById("imageModal").style.display = "none";
}
</script>

</body>
</html>
